openapi: 3.0.3
info:
  title: Evidra API
  description: |
    REST API for the Evidra reliability scoring platform.
    Receives evidence entries from CLI, MCP server, and CI pipelines.
    Computes behavioral signals and reliability scorecards.
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    url: https://github.com/vitas/evidra

servers:
  - url: /
    description: This server

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Evidence
    description: Evidence entry ingestion and queries
  - name: Analytics
    description: Scorecard computation and signal analysis
  - name: Auth
    description: Authentication and key management
  - name: Bench
    description: Infrastructure benchmark runs and leaderboard

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        '200':
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (database connectivity)
      security: []
      responses:
        '200':
          description: Database is connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/pubkey:
    get:
      tags: [Auth]
      summary: Get signing public key
      description: Returns the Ed25519 public key used to sign evidence entries.
      security: []
      responses:
        '200':
          description: PEM-encoded Ed25519 public key
          content:
            application/x-pem-file:
              schema:
                type: string

  /v1/keys:
    post:
      tags: [Auth]
      summary: Issue a new API key
      description: |
        Create a new API key for a tenant. Requires the invite secret
        via `X-Invite-Secret` header. Rate limited to 3 keys/hour/IP.
      security: []
      parameters:
        - name: X-Invite-Secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # label is optional
              properties:
                label:
                  type: string
                  maxLength: 128
                  example: my-ci-pipeline
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Full API key (only shown once)
                    example: ev1_abc123...
                  prefix:
                    type: string
                    example: ev1_abc
                  tenant_id:
                    type: string
                    example: default
                  created_at:
                    type: string
                    format: date-time
        '403':
          description: Invalid invite secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/check:
    get:
      tags: [Auth]
      summary: Verify authentication token
      description: Returns 200 with tenant ID for valid tokens. Used as forwardAuth target.
      responses:
        '200':
          description: Token is valid
          headers:
            X-Evidra-Tenant:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: string
                    example: "true"
                  tenant_id:
                    type: string
                    example: default
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    head:
      tags: [Auth]
      summary: Verify authentication token (HEAD)
      description: Returns 200 with X-Evidra-Tenant header for valid tokens. No response body.
      responses:
        '200':
          description: Token is valid
          headers:
            X-Evidra-Tenant:
              schema:
                type: string
        '401':
          description: Unauthorized

  /v1/evidence/ingest/prescribe:
    post:
      tags: [Evidence]
      summary: Ingest a prescribe evidence entry
      description: |
        Accepts a typed or override prescribe request, runs risk assessment,
        and returns a prescription with risk level and detections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPrescribeRequest'
            examples:
              typed:
                summary: Typed prescribe with canonical action
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  canonical_action:
                    tool: kubectl
                    operation: apply
                    operation_class: mutate
                    scope_class: staging
                    resource_identity:
                      - kind: Deployment
                        name: nginx
                        namespace: default
                    resource_count: 1
              override:
                summary: Override prescribe with raw payload
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  artifact_digest: sha256:abc123def456
                  payload_override:
                    prescription_id: presc-001
                    canonical_action:
                      tool: kubectl
                      operation: apply
                      operation_class: mutate
                      scope_class: staging
                      resource_identity:
                        - kind: Deployment
                          name: nginx
                          namespace: default
                      resource_count: 1
                    risk_inputs:
                      - source: evidra/matrix
                        risk_level: medium
                    effective_risk: medium
      responses:
        '200':
          description: Duplicate entry already exists
          content:
            application/json:
              schema:
                type: object
        '202':
          description: Prescribe accepted
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/ingest/report:
    post:
      tags: [Evidence]
      summary: Ingest a report evidence entry
      description: |
        Accepts a typed or override report request, records the outcome
        of a previously prescribed operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestReportRequest'
            examples:
              typed:
                summary: Typed report with verdict
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  prescription_id: presc-001
                  verdict: success
                  exit_code: 0
              override:
                summary: Override report with raw payload
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  artifact_digest: sha256:abc123def456
                  payload_override:
                    prescription_id: presc-001
                    report_id: rpt-001
                    verdict: success
                    exit_code: 0
      responses:
        '200':
          description: Duplicate entry already exists
          content:
            application/json:
              schema:
                type: object
        '202':
          description: Report accepted
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Prescription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/forward:
    post:
      tags: [Evidence]
      summary: Forward a single evidence entry
      description: Receives a JSON evidence entry, stores it, and returns a receipt ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Any valid JSON evidence entry
            example:
              entry_id: "01HXYZ..."
              type: prescribe
              trace_id: "trace-123"
              payload: {}
      responses:
        '200':
          description: Entry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/batch:
    post:
      tags: [Evidence]
      summary: Batch forward multiple entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                  minItems: 1
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    example: 5
                  errors:
                    type: array
                    items:
                      type: string

  /v1/evidence/findings:
    post:
      tags: [Evidence]
      summary: Ingest SARIF scanner findings
      description: Accepts SARIF or JSON findings from security scanners.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Findings accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/entries:
    get:
      tags: [Evidence]
      summary: List evidence entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: type
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
          description: Time period filter (e.g. 30d, 7d)
      responses:
        '200':
          description: List of entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object

  /v1/evidence/entries/{id}:
    get:
      tags: [Evidence]
      summary: Get a single entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry found
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/scorecard:
    get:
      tags: [Analytics]
      summary: Compute tenant-wide reliability scorecard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: 30d
          description: Time period (e.g. 30d, 7d)
        - name: actor
          in: query
          schema:
            type: string
          description: Narrow to a single actor ID
        - name: tool
          in: query
          schema:
            type: string
          description: Filter by tool name
        - name: scope
          in: query
          schema:
            type: string
          description: Filter by scope class
        - name: session_id
          in: query
          schema:
            type: string
          description: Narrow to a single session ID
        - name: min_operations
          in: query
          schema:
            type: integer
            minimum: 1
          description: Override the minimum operation threshold for sufficiency
      responses:
        '200':
          description: Scorecard computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorecardResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/explain:
    get:
      tags: [Analytics]
      summary: Explain tenant-wide analytics signals
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: 30d
        - name: actor
          in: query
          schema:
            type: string
        - name: tool
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: string
        - name: min_operations
          in: query
          schema:
            type: integer
            minimum: 1
          description: Override the minimum operation threshold for sufficiency
      responses:
        '200':
          description: Explain output computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/leaderboard:
    get:
      summary: Model leaderboard (public, no auth)
      tags: [Bench]
      security: []
      parameters:
        - name: evidence_mode
          in: query
          schema:
            type: string
            enum: [proxy, smart]
            default: proxy
      responses:
        '200':
          description: Leaderboard data

  /v1/bench/scenarios:
    get:
      summary: Scenario catalog (public, no auth)
      tags: [Bench]
      security: []
      responses:
        '200':
          description: List of scenarios

  /v1/bench/runs:
    get:
      summary: List benchmark runs
      tags: [Bench]
      parameters:
        - name: model
          in: query
          schema: { type: string }
        - name: scenario
          in: query
          schema: { type: string }
        - name: evidence_mode
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated run list
    post:
      summary: Submit a benchmark run
      tags: [Bench]
      responses:
        '201':
          description: Run created

  /v1/bench/runs/batch:
    post:
      summary: Batch submit runs (idempotent)
      tags: [Bench]
      responses:
        '200':
          description: Import result

  /v1/bench/runs/archive:
    post:
      summary: Archive runs matching a filter
      tags: [Bench]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                before:
                  type: string
                  format: date-time
                  description: Archive runs created before this timestamp
                ids:
                  type: array
                  items: { type: string }
                  description: Archive runs with these IDs
                model:
                  type: string
                  description: Archive runs for this model
      responses:
        '200':
          description: Archive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  archived:
                    type: integer
        '400':
          description: Missing filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/runs/{id}:
    get:
      summary: Get run detail
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Run record
    delete:
      summary: Delete a single run
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Run deleted
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/runs/{id}/transcript:
    get:
      summary: Run transcript (text/plain)
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Transcript text

  /v1/bench/runs/{id}/tool-calls:
    get:
      summary: Tool call log (JSON)
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tool calls array

  /v1/bench/runs/{id}/timeline:
    get:
      summary: Decision timeline
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Timeline with phases

  /v1/bench/runs/{id}/scorecard:
    get:
      summary: Run scorecard data
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Scorecard JSON

  /v1/bench/stats:
    get:
      summary: Aggregate statistics
      tags: [Bench]
      responses:
        '200':
          description: Stats

  /v1/bench/catalog:
    get:
      summary: Distinct models and providers
      tags: [Bench]
      responses:
        '200':
          description: Catalog

  /v1/bench/compare/runs:
    get:
      summary: Compare two runs with computed delta
      tags: [Bench]
      parameters:
        - name: a
          in: query
          required: true
          schema: { type: string }
          description: First run ID
        - name: b
          in: query
          required: true
          schema: { type: string }
          description: Second run ID
      responses:
        '200':
          description: Run comparison with delta

  /v1/bench/compare/models:
    get:
      summary: Compare two models across shared scenarios
      tags: [Bench]
      parameters:
        - name: a
          in: query
          required: true
          schema: { type: string }
          description: First model name
        - name: b
          in: query
          required: true
          schema: { type: string }
          description: Second model name
        - name: evidence_mode
          in: query
          schema:
            type: string
            enum: [proxy, smart]
            default: proxy
      responses:
        '200':
          description: Per-scenario model comparison with summary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key issued via POST /v1/keys or EVIDRA_API_KEY env var

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ForwardResponse:
      type: object
      properties:
        receipt_id:
          type: string
        status:
          type: string
          example: accepted

    IngestPrescribeRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestPrescribeTypedRequest'
        - $ref: '#/components/schemas/IngestPrescribeOverrideRequest'

    IngestPrescribeTypedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
      not:
        required: [payload_override]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        canonical_action:
          $ref: '#/components/schemas/CanonicalAction'
        smart_target:
          $ref: '#/components/schemas/SmartTarget'

    IngestPrescribeOverrideRequest:
      type: object
      required:
        - payload_override
      properties:
        payload_override:
          type: object
          properties:
            canonical_action:
              type: object
        artifact_digest:
          type: string

    IngestReportRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestReportNonDeclinedRequest'
        - $ref: '#/components/schemas/IngestReportDeclinedRequest'
        - $ref: '#/components/schemas/IngestReportOverrideRequest'

    IngestReportNonDeclinedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
        - prescription_id
        - verdict
        - exit_code
      not:
        anyOf:
          - required: [payload_override]
          - required: [decision_context]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        verdict:
          type: string
          enum: [success, failure, error]
        exit_code:
          type: integer
        external_refs:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRef'

    IngestReportDeclinedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
        - prescription_id
        - verdict
        - decision_context
      not:
        anyOf:
          - required: [payload_override]
          - required: [exit_code]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        verdict:
          type: string
          enum: [declined]
        decision_context:
          $ref: '#/components/schemas/DecisionContext'
        external_refs:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRef'

    IngestReportOverrideRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestReportNonDeclinedOverrideRequest'
        - $ref: '#/components/schemas/IngestReportDeclinedOverrideRequest'

    IngestReportNonDeclinedOverrideRequest:
      type: object
      required:
        - payload_override
      not:
        anyOf:
          - required: [prescription_id]
          - required: [verdict]
          - required: [exit_code]
          - required: [decision_context]
          - required: [external_refs]
      properties:
        payload_override:
          type: object
          required:
            - prescription_id
            - verdict
            - exit_code
          not:
            required: [decision_context]
          properties:
            prescription_id:
              type: string
            verdict:
              type: string
              enum: [success, failure, error]
            exit_code:
              type: integer
        artifact_digest:
          type: string

    IngestReportDeclinedOverrideRequest:
      type: object
      required:
        - payload_override
      not:
        anyOf:
          - required: [prescription_id]
          - required: [verdict]
          - required: [exit_code]
          - required: [decision_context]
          - required: [external_refs]
      properties:
        payload_override:
          type: object
          required:
            - prescription_id
            - verdict
            - decision_context
          not:
            required: [exit_code]
          properties:
            prescription_id:
              type: string
            verdict:
              type: string
              enum: [declined]
            decision_context:
              $ref: '#/components/schemas/DecisionContext'
        artifact_digest:
          type: string

    Actor:
      type: object
      required: [type, id, provenance]
      properties:
        type:
          type: string
          description: Actor category (e.g. agent, human, pipeline)
        id:
          type: string
          description: Unique actor identifier
        provenance:
          type: string
          description: How the actor was authenticated (e.g. mcp, api-key)
        instance_id:
          type: string
        version:
          type: string
        skill_version:
          type: string

    EvidenceMetadata:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [declared, observed, translated]
          description: How Evidra obtained the lifecycle evidence

    SourceMetadata:
      type: object
      required: [system]
      properties:
        system:
          type: string
          description: The system that produced the lifecycle evidence (e.g. cli, mcp, ci)

    Claim:
      type: object
      required: [source, key]
      properties:
        source:
          type: string
        key:
          type: string
        payload:
          type: object

    CanonicalAction:
      type: object
      properties:
        tool:
          type: string
          description: Tool name (e.g. kubectl, terraform, helm)
        operation:
          type: string
          description: Operation name (e.g. apply, delete, plan)
        operation_class:
          type: string
          description: Operation classification (mutate, destroy, read, plan, unknown)
        scope_class:
          type: string
          description: Environment scope (production, staging, development, unknown)
        resource_identity:
          type: array
          items:
            $ref: '#/components/schemas/ResourceID'
        resource_count:
          type: integer
        resource_shape_hash:
          type: string

    ResourceID:
      type: object
      properties:
        api_version:
          type: string
        kind:
          type: string
        namespace:
          type: string
        name:
          type: string
        type:
          type: string
        actions:
          type: string

    SmartTarget:
      type: object
      required: [tool, operation, resource]
      properties:
        tool:
          type: string
        operation:
          type: string
        resource:
          type: string
        namespace:
          type: string

    DecisionContext:
      type: object
      required: [trigger, reason]
      properties:
        trigger:
          type: string
          description: What triggered the decline decision
        reason:
          type: string
          description: Operational reason for declining (max 512 chars)
          maxLength: 512

    ExternalRef:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
        id:
          type: string

