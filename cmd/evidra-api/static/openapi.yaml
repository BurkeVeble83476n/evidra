openapi: 3.0.3
info:
  title: Evidra API
  description: |
    REST API for the Evidra reliability scoring platform.
    Receives evidence entries from CLI, MCP server, and CI pipelines.
    Computes behavioral signals and reliability scorecards.
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    url: https://github.com/vitas/evidra

servers:
  - url: /
    description: This server

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Evidence
    description: Evidence entry ingestion and queries
  - name: Analytics
    description: Scorecard computation and signal analysis
  - name: Auth
    description: Authentication and key management
  - name: Bench
    description: Infrastructure benchmark runs and leaderboard

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        '200':
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check (database connectivity)
      security: []
      responses:
        '200':
          description: Database is connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/pubkey:
    get:
      tags: [Auth]
      summary: Get signing public key
      description: Returns the Ed25519 public key used to sign evidence entries.
      security: []
      responses:
        '200':
          description: PEM-encoded Ed25519 public key
          content:
            application/x-pem-file:
              schema:
                type: string

  /v1/keys:
    post:
      tags: [Auth]
      summary: Issue a new API key
      description: |
        Create a new API key for a tenant. Requires the invite secret
        via `X-Invite-Secret` header. Rate limited to 3 keys/hour/IP.
      security: []
      parameters:
        - name: X-Invite-Secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # label is optional
              properties:
                label:
                  type: string
                  maxLength: 128
                  example: my-ci-pipeline
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Full API key (only shown once)
                    example: ev1_abc123...
                  prefix:
                    type: string
                    example: ev1_abc
                  tenant_id:
                    type: string
                    example: default
                  created_at:
                    type: string
                    format: date-time
        '403':
          description: Invalid invite secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/check:
    get:
      tags: [Auth]
      summary: Verify authentication token
      description: Returns 200 with tenant ID for valid tokens. Used as forwardAuth target.
      responses:
        '200':
          description: Token is valid
          headers:
            X-Evidra-Tenant:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: string
                    example: "true"
                  tenant_id:
                    type: string
                    example: default
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    head:
      tags: [Auth]
      summary: Verify authentication token (HEAD)
      description: Returns 200 with X-Evidra-Tenant header for valid tokens. No response body.
      responses:
        '200':
          description: Token is valid
          headers:
            X-Evidra-Tenant:
              schema:
                type: string
        '401':
          description: Unauthorized

  /v1/evidence/ingest/prescribe:
    post:
      tags: [Evidence]
      summary: Ingest a prescribe evidence entry
      description: |
        Accepts a typed or override prescribe request, runs risk assessment,
        and returns a prescription with risk level and detections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPrescribeRequest'
            examples:
              typed:
                summary: Typed prescribe with canonical action
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  canonical_action:
                    tool: kubectl
                    operation: apply
                    operation_class: mutate
                    scope_class: staging
                    resource_identity:
                      - kind: Deployment
                        name: nginx
                        namespace: default
                    resource_count: 1
              override:
                summary: Override prescribe with raw payload
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  artifact_digest: sha256:abc123def456
                  payload_override:
                    prescription_id: presc-001
                    canonical_action:
                      tool: kubectl
                      operation: apply
                      operation_class: mutate
                      scope_class: staging
                      resource_identity:
                        - kind: Deployment
                          name: nginx
                          namespace: default
                      resource_count: 1
                    risk_inputs:
                      - source: evidra/matrix
                        risk_level: medium
                    effective_risk: medium
      responses:
        '200':
          description: Duplicate entry already exists
          content:
            application/json:
              schema:
                type: object
        '202':
          description: Prescribe accepted
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/ingest/report:
    post:
      tags: [Evidence]
      summary: Ingest a report evidence entry
      description: |
        Accepts a typed or override report request, records the outcome
        of a previously prescribed operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestReportRequest'
            examples:
              typed:
                summary: Typed report with verdict
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  prescription_id: presc-001
                  verdict: success
                  exit_code: 0
              override:
                summary: Override report with raw payload
                value:
                  contract_version: v1
                  actor:
                    type: agent
                    id: agent-1
                    provenance: mcp
                  session_id: sess-001
                  operation_id: op-001
                  trace_id: trace-001
                  flavor: imperative
                  evidence:
                    kind: declared
                  source:
                    system: cli
                  artifact_digest: sha256:abc123def456
                  payload_override:
                    prescription_id: presc-001
                    report_id: rpt-001
                    verdict: success
                    exit_code: 0
      responses:
        '200':
          description: Duplicate entry already exists
          content:
            application/json:
              schema:
                type: object
        '202':
          description: Report accepted
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Prescription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/forward:
    post:
      tags: [Evidence]
      summary: Forward a single evidence entry
      description: Receives a JSON evidence entry, stores it, and returns a receipt ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Any valid JSON evidence entry
            example:
              entry_id: "01HXYZ..."
              type: prescribe
              trace_id: "trace-123"
              payload: {}
      responses:
        '200':
          description: Entry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/batch:
    post:
      tags: [Evidence]
      summary: Batch forward multiple entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                  minItems: 1
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    example: 5
                  errors:
                    type: array
                    items:
                      type: string

  /v1/evidence/findings:
    post:
      tags: [Evidence]
      summary: Ingest SARIF scanner findings
      description: Accepts SARIF or JSON findings from security scanners.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Findings accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/entries:
    get:
      tags: [Evidence]
      summary: List evidence entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: type
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
          description: Time period filter (e.g. 30d, 7d)
      responses:
        '200':
          description: List of entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        tool:
                          type: string
                        operation:
                          type: string
                        scope:
                          type: string
                        risk_level:
                          type: string
                        actor:
                          type: string
                        resource:
                          type: string
                          description: Target resource identity (e.g. "deployment/web (demo)")
                        verdict:
                          type: string
                        exit_code:
                          type: integer
                        created_at:
                          type: string
                          format: date-time

  /v1/evidence/entries/{id}:
    get:
      tags: [Evidence]
      summary: Get a single entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry found
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/scorecard:
    get:
      tags: [Analytics]
      summary: Compute tenant-wide reliability scorecard
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: 30d
          description: Time period (e.g. 30d, 7d)
        - name: actor
          in: query
          schema:
            type: string
          description: Narrow to a single actor ID
        - name: tool
          in: query
          schema:
            type: string
          description: Filter by tool name
        - name: scope
          in: query
          schema:
            type: string
          description: Filter by scope class
        - name: session_id
          in: query
          schema:
            type: string
          description: Narrow to a single session ID
        - name: min_operations
          in: query
          schema:
            type: integer
            minimum: 1
          description: Override the minimum operation threshold for sufficiency
      responses:
        '200':
          description: Scorecard computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorecardResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/evidence/explain:
    get:
      tags: [Analytics]
      summary: Explain tenant-wide analytics signals
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: 30d
        - name: actor
          in: query
          schema:
            type: string
        - name: tool
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: string
        - name: min_operations
          in: query
          schema:
            type: integer
            minimum: 1
          description: Override the minimum operation threshold for sufficiency
      responses:
        '200':
          description: Explain output computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/leaderboard:
    get:
      summary: Model leaderboard (public, no auth)
      tags: [Bench]
      security: []
      parameters:
        - name: evidence_mode
          in: query
          schema:
            type: string
            enum: [proxy, smart]
            default: proxy
      responses:
        '200':
          description: Leaderboard data

  /v1/bench/scenarios:
    get:
      summary: Scenario catalog (public, no auth)
      tags: [Bench]
      security: []
      responses:
        '200':
          description: List of scenarios

  /v1/bench/runs:
    get:
      summary: List benchmark runs
      tags: [Bench]
      parameters:
        - name: model
          in: query
          schema: { type: string }
        - name: scenario
          in: query
          schema: { type: string }
        - name: evidence_mode
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated run list
    post:
      summary: Submit a benchmark run
      tags: [Bench]
      responses:
        '201':
          description: Run created

  /v1/bench/runs/batch:
    post:
      summary: Batch submit runs (idempotent)
      tags: [Bench]
      responses:
        '200':
          description: Import result

  /v1/bench/runs/archive:
    post:
      summary: Archive runs matching a filter
      tags: [Bench]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                before:
                  type: string
                  format: date-time
                  description: Archive runs created before this timestamp
                ids:
                  type: array
                  items: { type: string }
                  description: Archive runs with these IDs
                model:
                  type: string
                  description: Archive runs for this model
      responses:
        '200':
          description: Archive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  archived:
                    type: integer
        '400':
          description: Missing filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/runs/{id}:
    get:
      summary: Get run detail
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Run record
    delete:
      summary: Delete a single run
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Run deleted
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/runs/{id}/transcript:
    get:
      summary: Run transcript (text/plain)
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Transcript text

  /v1/bench/runs/{id}/tool-calls:
    get:
      summary: Tool call log (JSON)
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tool calls array

  /v1/bench/runs/{id}/timeline:
    get:
      summary: Decision timeline
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Timeline with phases

  /v1/bench/runs/{id}/scorecard:
    get:
      summary: Run scorecard data
      tags: [Bench]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Scorecard JSON

  /v1/bench/stats:
    get:
      summary: Aggregate statistics
      tags: [Bench]
      responses:
        '200':
          description: Stats

  /v1/bench/catalog:
    get:
      summary: Distinct models and providers
      tags: [Bench]
      responses:
        '200':
          description: Catalog

  /v1/bench/models:
    get:
      summary: List models enabled for the authenticated tenant
      tags: [Bench]
      responses:
        '200':
          description: Models available through platform defaults or tenant overrides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnabledModelsResponse'
        '500':
          description: Query failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/models/{model_id}/provider:
    put:
      summary: Create or update a tenant-specific provider override for a model
      tags: [Bench]
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Bench model ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantProviderConfig'
            example:
              api_key: sk-secret
              api_base_url: https://gateway.example.com/v1
              rate_limit: 10
              monthly_budget: 100
      responses:
        '204':
          description: Tenant override saved
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a tenant-specific provider override for a model
      tags: [Bench]
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Bench model ID
      responses:
        '204':
          description: Tenant override deleted
        '500':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/admin/bench/models/{model_id}:
    put:
      tags: [Bench]
      summary: Update platform-level defaults for a bench model
      description: |
        Invite-gated administrative route for setting model defaults that apply
        across tenants. This route is not protected by Bearer auth; it requires
        the `X-Invite-Secret` header instead.
      security: []
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
          description: Bench model ID
        - name: X-Invite-Secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalModelConfig'
            example:
              api_base_url: https://gateway.example.com/v1
              api_key_env: CUSTOM_API_KEY
      responses:
        '204':
          description: Model defaults updated
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing or invalid invite secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Invite secret not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/bench/compare/runs:
    get:
      summary: Compare two runs with computed delta
      tags: [Bench]
      parameters:
        - name: a
          in: query
          required: true
          schema: { type: string }
          description: First run ID
        - name: b
          in: query
          required: true
          schema: { type: string }
          description: Second run ID
      responses:
        '200':
          description: Run comparison with delta

  /v1/bench/compare/models:
    get:
      summary: Compare models across scenarios (pairwise or matrix)
      tags: [Bench]
      description: |
        Two modes:
        - Pairwise: ?a=X&b=Y — compare two models
        - Matrix: ?models=X,Y,Z&scenarios=A,B — multi-model grid (scenarios optional)
      parameters:
        - name: a
          in: query
          schema: { type: string }
          description: First model name (pairwise mode)
        - name: b
          in: query
          schema: { type: string }
          description: Second model name (pairwise mode)
        - name: models
          in: query
          schema: { type: string }
          description: Comma-separated model names (matrix mode)
        - name: scenarios
          in: query
          schema: { type: string }
          description: Comma-separated scenario IDs (matrix mode, optional)
        - name: evidence_mode
          in: query
          schema:
            type: string
            enum: [proxy, smart]
            default: proxy
      responses:
        '200':
          description: Pairwise comparison or model matrix grid

  /v1/bench/signals:
    get:
      summary: Aggregated signal counts across runs
      tags: [Bench]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: evidence_mode
          in: query
          schema:
            type: string
            enum: [proxy, smart]
            default: proxy
        - name: since
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Signal aggregation
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_runs: { type: integer }
                  runs_with_scorecard: { type: integer }
                  signals:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        total: { type: integer }
                        run_count: { type: integer }
                  avg_score: { type: number }

  /v1/bench/regressions:
    get:
      summary: Detect scenario/model regressions
      tags: [Bench]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of regressions (latest run failed, previous passed)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    scenario_id: { type: string }
                    model: { type: string }
                    latest_run_id: { type: string }
                    latest_passed: { type: boolean }
                    prev_passed: { type: integer }
                    prev_total: { type: integer }
                    prev_rate: { type: number }
                    severity: { type: string, enum: [critical, warning] }

  /v1/bench/insights:
    get:
      summary: Failure analysis for a scenario
      tags: [Bench]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: scenario
          in: query
          required: true
          schema: { type: string }
          description: Scenario ID
      responses:
        '200':
          description: Failure patterns, check stats, model breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenario_id: { type: string }
                  total_runs: { type: integer }
                  failed_runs: { type: integer }
                  passed_runs: { type: integer }
                  check_failures:
                    type: array
                    items:
                      type: object
                      properties:
                        check_name: { type: string }
                        check_type: { type: string }
                        fail_count: { type: integer }
                        fail_rate: { type: number }
                  model_breakdown:
                    type: array
                    items:
                      type: object
                      properties:
                        model: { type: string }
                        runs: { type: integer }
                        passed: { type: integer }
                        failed: { type: integer }
                        rate: { type: number }
                  behavior_metrics:
                    type: object
                    properties:
                      pass_avg_turns: { type: number }
                      fail_avg_turns: { type: number }
                      pass_avg_duration: { type: number }
                      fail_avg_duration: { type: number }

  /v1/bench/trigger:
    post:
      tags: [Bench]
      summary: Start a benchmark run
      description: Starts a benchmark run via the configured executor or enqueues it for a healthy poll-based runner. Returns a job ID for progress tracking.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, scenarios]
              properties:
                model:
                  type: string
                  example: deepseek-chat
                provider:
                  type: string
                  example: deepseek
                runner_id:
                  type: string
                  description: Optional runner pin. When set, the request is accepted only if that healthy runner supports the requested model.
                  example: 01KMN4V5WAT59TV06DP5FE0NAJ
                scenarios:
                  type: array
                  items:
                    type: string
                  example: [broken-deployment, repair-loop-escalation]
      responses:
        '202':
          description: Trigger accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: pending
                  mode:
                    type: string
                    description: Present when the job was queued for the poll-based runner path.
                    enum: [runner]
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '501':
          description: No executor configured

  /v1/bench/trigger/{id}:
    get:
      tags: [Bench]
      summary: Get trigger progress
      description: Returns current job state. Supports SSE streaming when Accept includes text/event-stream.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job state (JSON snapshot or SSE stream)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string, enum: [pending, running, completed, failed] }
                  model: { type: string }
                  provider: { type: string }
                  total: { type: integer }
                  completed: { type: integer }
                  passed: { type: integer }
                  failed: { type: integer }
                  current_scenario: { type: string }
                  run_ids:
                    type: array
                    items: { type: string }
                  progress:
                    type: array
                    items:
                      type: object
                      properties:
                        scenario: { type: string }
                        status: { type: string, enum: [pending, running, passed, failed, error, skipped] }
                        run_id: { type: string }
                  created_at:
                    type: string
                    format: date-time
        '404':
          description: Job not found

  /v1/bench/trigger/{id}/progress:
    post:
      tags: [Bench]
      summary: Webhook for executor progress updates
      description: Called by the bench executor to report scenario completion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contract_version:
                  type: string
                  example: v1.0.0
                scenario:
                  type: string
                status:
                  type: string
                  enum: [running, passed, failed, error, skipped]
                run_id:
                  type: string
                completed:
                  type: integer
                total:
                  type: integer
      responses:
        '200':
          description: Progress recorded
        '404':
          description: Job not found

  /v1/runners/register:
    post:
      tags: [Bench]
      summary: Register a poll-based runner
      description: Registers a runner in the control plane and advertises its supported models.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [models]
              properties:
                name:
                  type: string
                  example: eu-west-runner-a
                models:
                  type: array
                  items: { type: string }
                  example: [deepseek-chat, qwen-plus]
                provider:
                  type: string
                  example: bifrost
                region:
                  type: string
                  example: eu-west
                max_parallel:
                  type: integer
                  example: 2
                labels:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '201':
          description: Runner registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  runner_id: { type: string }
                  poll_interval: { type: integer }
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /v1/runners:
    get:
      tags: [Bench]
      summary: List registered runners
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registered runners
          content:
            application/json:
              schema:
                type: object
                properties:
                  runners:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        tenant_id: { type: string }
                        name: { type: string }
                        region: { type: string }
                        status: { type: string }
                        config:
                          type: object
                          properties:
                            models:
                              type: array
                              items: { type: string }
                            provider: { type: string }
                            max_parallel: { type: integer }
                            poll_interval: { type: integer }
                            labels:
                              type: object
                              additionalProperties:
                                type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
        '401':
          description: Unauthorized

  /v1/runners/{id}:
    delete:
      tags: [Bench]
      summary: Delete a registered runner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Runner deleted
        '401':
          description: Unauthorized
        '404':
          description: Runner not found

  /v1/runners/jobs:
    get:
      tags: [Bench]
      summary: Poll for the next runner job
      description: Polls the persisted bench job queue. The poll also acts as the runner heartbeat.
      security:
        - bearerAuth: []
      parameters:
        - name: runner_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  model: { type: string }
                  provider: { type: string }
                  scenarios:
                    type: array
                    items: { type: string }
                  timeout:
                    type: integer
        '204':
          description: No matching job available
        '400':
          description: Missing runner_id
        '401':
          description: Unauthorized
        '404':
          description: Runner not found or not healthy

  /v1/runners/jobs/{id}/complete:
    post:
      tags: [Bench]
      summary: Complete a claimed runner job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [runner_id, status]
              properties:
                runner_id:
                  type: string
                status:
                  type: string
                  enum: [completed, failed]
                passed:
                  type: integer
                failed:
                  type: integer
                message:
                  type: string
      responses:
        '204':
          description: Job completion recorded
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Job not found or not owned by this runner

  /v1/bench/scenarios/sync:
    post:
      summary: Upsert scenario metadata
      tags: [Bench]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenarios]
              properties:
                scenarios:
                  type: array
                  items:
                    type: object
                    required: [id]
                    properties:
                      id: { type: string }
                      title: { type: string }
                      description: { type: string }
                      category: { type: string }
                      tags:
                        type: array
                        items: { type: string }
                      chaos: { type: boolean }
                      evidra: { type: boolean }
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  upserted: { type: integer }
                  total: { type: integer }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key issued via POST /v1/keys or EVIDRA_API_KEY env var

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    EnabledModel:
      type: object
      required: [id, display_name, provider, input_cost_per_mtok, output_cost_per_mtok]
      properties:
        id:
          type: string
          example: gemini-2.5-flash
        display_name:
          type: string
          example: Gemini 2.5 Flash
        provider:
          type: string
          example: google
        api_base_url:
          type: string
          description: Provider API base URL (empty when using default)
          example: https://generativelanguage.googleapis.com/v1beta/openai
        input_cost_per_mtok:
          type: number
          example: 0.15
        output_cost_per_mtok:
          type: number
          example: 0.60

    EnabledModelsResponse:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/EnabledModel'

    TenantProviderConfig:
      type: object
      properties:
        api_key:
          type: string
          description: Encrypted provider key payload supplied by the tenant
        api_base_url:
          type: string
          description: Optional tenant-specific provider base URL override
        rate_limit:
          type: integer
          description: Optional per-tenant provider rate limit
        monthly_budget:
          type: number
          description: Optional per-tenant monthly spend budget

    GlobalModelConfig:
      type: object
      properties:
        api_base_url:
          type: string
          description: Optional platform-level base URL override
        api_key_env:
          type: string
          description: Environment variable name holding the platform API key

    ForwardResponse:
      type: object
      properties:
        receipt_id:
          type: string
        status:
          type: string
          example: accepted

    IngestPrescribeRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestPrescribeTypedRequest'
        - $ref: '#/components/schemas/IngestPrescribeOverrideRequest'

    IngestPrescribeTypedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
      not:
        required: [payload_override]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        canonical_action:
          $ref: '#/components/schemas/CanonicalAction'
        smart_target:
          $ref: '#/components/schemas/SmartTarget'

    IngestPrescribeOverrideRequest:
      type: object
      required:
        - payload_override
      properties:
        payload_override:
          type: object
          properties:
            canonical_action:
              type: object
        artifact_digest:
          type: string

    IngestReportRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestReportNonDeclinedRequest'
        - $ref: '#/components/schemas/IngestReportDeclinedRequest'
        - $ref: '#/components/schemas/IngestReportOverrideRequest'

    IngestReportNonDeclinedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
        - prescription_id
        - verdict
        - exit_code
      not:
        anyOf:
          - required: [payload_override]
          - required: [decision_context]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        verdict:
          type: string
          enum: [success, failure, error]
        exit_code:
          type: integer
        external_refs:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRef'

    IngestReportDeclinedRequest:
      type: object
      required:
        - contract_version
        - actor
        - session_id
        - operation_id
        - trace_id
        - flavor
        - evidence
        - source
        - prescription_id
        - verdict
        - decision_context
      not:
        anyOf:
          - required: [payload_override]
          - required: [exit_code]
      properties:
        contract_version:
          type: string
          enum: [v1]
        actor:
          $ref: '#/components/schemas/Actor'
        session_id:
          type: string
        operation_id:
          type: string
        trace_id:
          type: string
        span_id:
          type: string
        parent_span_id:
          type: string
        flavor:
          type: string
          enum: [imperative, reconcile, workflow]
        evidence:
          $ref: '#/components/schemas/EvidenceMetadata'
        source:
          $ref: '#/components/schemas/SourceMetadata'
        scope_dimensions:
          type: object
          additionalProperties:
            type: string
        claim:
          $ref: '#/components/schemas/Claim'
        prescription_id:
          type: string
        artifact_digest:
          type: string
        verdict:
          type: string
          enum: [declined]
        decision_context:
          $ref: '#/components/schemas/DecisionContext'
        external_refs:
          type: array
          items:
            $ref: '#/components/schemas/ExternalRef'

    IngestReportOverrideRequest:
      oneOf:
        - $ref: '#/components/schemas/IngestReportNonDeclinedOverrideRequest'
        - $ref: '#/components/schemas/IngestReportDeclinedOverrideRequest'

    IngestReportNonDeclinedOverrideRequest:
      type: object
      required:
        - payload_override
      not:
        anyOf:
          - required: [prescription_id]
          - required: [verdict]
          - required: [exit_code]
          - required: [decision_context]
          - required: [external_refs]
      properties:
        payload_override:
          type: object
          required:
            - prescription_id
            - verdict
            - exit_code
          not:
            required: [decision_context]
          properties:
            prescription_id:
              type: string
            verdict:
              type: string
              enum: [success, failure, error]
            exit_code:
              type: integer
        artifact_digest:
          type: string

    IngestReportDeclinedOverrideRequest:
      type: object
      required:
        - payload_override
      not:
        anyOf:
          - required: [prescription_id]
          - required: [verdict]
          - required: [exit_code]
          - required: [decision_context]
          - required: [external_refs]
      properties:
        payload_override:
          type: object
          required:
            - prescription_id
            - verdict
            - decision_context
          not:
            required: [exit_code]
          properties:
            prescription_id:
              type: string
            verdict:
              type: string
              enum: [declined]
            decision_context:
              $ref: '#/components/schemas/DecisionContext'
        artifact_digest:
          type: string

    Actor:
      type: object
      required: [type, id, provenance]
      properties:
        type:
          type: string
          description: Actor category (e.g. agent, human, pipeline)
        id:
          type: string
          description: Unique actor identifier
        provenance:
          type: string
          description: How the actor was authenticated (e.g. mcp, api-key)
        instance_id:
          type: string
        version:
          type: string
        skill_version:
          type: string

    EvidenceMetadata:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [declared, observed, translated]
          description: How Evidra obtained the lifecycle evidence

    SourceMetadata:
      type: object
      required: [system]
      properties:
        system:
          type: string
          description: The system that produced the lifecycle evidence (e.g. cli, mcp, ci)

    Claim:
      type: object
      required: [source, key]
      properties:
        source:
          type: string
        key:
          type: string
        payload:
          type: object

    CanonicalAction:
      type: object
      properties:
        tool:
          type: string
          description: Tool name (e.g. kubectl, terraform, helm)
        operation:
          type: string
          description: Operation name (e.g. apply, delete, plan)
        operation_class:
          type: string
          description: Operation classification (mutate, destroy, read, plan, unknown)
        scope_class:
          type: string
          description: Environment scope (production, staging, development, unknown)
        resource_identity:
          type: array
          items:
            $ref: '#/components/schemas/ResourceID'
        resource_count:
          type: integer
        resource_shape_hash:
          type: string

    ResourceID:
      type: object
      properties:
        api_version:
          type: string
        kind:
          type: string
        namespace:
          type: string
        name:
          type: string
        type:
          type: string
        actions:
          type: string

    SmartTarget:
      type: object
      required: [tool, operation, resource]
      properties:
        tool:
          type: string
        operation:
          type: string
        resource:
          type: string
        namespace:
          type: string

    DecisionContext:
      type: object
      required: [trigger, reason]
      properties:
        trigger:
          type: string
          description: What triggered the decline decision
        reason:
          type: string
          description: Operational reason for declining (max 512 chars)
          maxLength: 512

    ExternalRef:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
        id:
          type: string
