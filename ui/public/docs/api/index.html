<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evidra API Documentation</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
  body { margin: 0; background: #fafafa; }
  .topbar-wrapper { display: none !important; }
  .swagger-ui .info { margin: 20px 0; }
  .back-link {
    display: block; padding: 0.75rem 1rem; background: #fff;
    border-bottom: 1px solid #e5e7eb; font-family: -apple-system, sans-serif;
    font-size: 0.9rem;
  }
  .back-link a { color: #166534; text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="back-link"><a href="/">&larr; Back to Evidra</a></div>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  SwaggerUIBundle({
    url: '/openapi.yaml',
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
    layout: 'BaseLayout',
    deepLinking: true,
    defaultModelsExpandDepth: 1,
  });
</script>
</body>
</html>
